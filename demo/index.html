<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@cyberlz/react-date-range — Stable Demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 0;
        background: #f8fafc;
        color: #1e293b;
        line-height: 1.6;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      header {
        margin-bottom: 2rem;
      }

      h1 {
        font-size: 1.75rem;
        margin: 0 0 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 0.2em 0.6em;
        border-radius: 4px;
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fcd34d;
        white-space: nowrap;
      }

      .install-block {
        background: #1e293b;
        color: #e2e8f0;
        padding: 0.75rem 1rem;
        border-radius: 6px;
        font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
        font-size: 0.85rem;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        margin: 1rem 0;
      }

      .demo-panel {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .demo-panel h2 {
        font-size: 1rem;
        margin: 0 0 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid #e2e8f0;
      }

      .state-output {
        background: #f1f5f9;
        border-radius: 6px;
        padding: 0.75rem 1rem;
        font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
        font-size: 0.8rem;
        white-space: pre-wrap;
        word-break: break-all;
        overflow-x: auto;
        margin-top: 0.5rem;
      }

      .state-output code {
        background: none;
      }

      footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #94a3b8;
        text-align: center;
      }

      footer a {
        color: #64748b;
      }

      @media (max-width: 600px) {
        .container {
          padding: 1rem 0.75rem;
        }

        h1 {
          font-size: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
