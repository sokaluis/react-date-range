<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@cyberlz/react-date-range — Stable Demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 0;
        background: #f8fafc;
        color: #1e293b;
        line-height: 1.6;
      }

      .container {
        --page-max-width: none;
        width: 100%;
        max-width: var(--page-max-width);
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      header {
        margin-bottom: 2rem;
      }

      h1 {
        font-size: 1.75rem;
        margin: 0 0 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 0.2em 0.6em;
        border-radius: 4px;
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fcd34d;
        white-space: nowrap;
      }

      .install-block {
        background: #1e293b;
        color: #e2e8f0;
        padding: 0.75rem 1rem;
        border-radius: 6px;
        font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
        font-size: 0.85rem;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        margin: 1rem 0;
      }

      .demo-panel {
        --demo-panel-max-width: 100%;
        width: 100%;
        max-width: var(--demo-panel-max-width);
        margin-inline: auto;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        overflow-x: hidden;
      }

      .demo-panel h2 {
        font-size: 1rem;
        margin: 0 0 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid #e2e8f0;
      }

      .state-output {
        background: #f1f5f9;
        border-radius: 6px;
        padding: 0.75rem 1rem;
        font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
        font-size: 0.8rem;
        white-space: pre-wrap;
        word-break: break-all;
        overflow-x: auto;
        margin-top: 0.5rem;
      }

      .state-output code {
        background: none;
      }

      footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #94a3b8;
        text-align: center;
      }

      footer a {
        color: #64748b;
      }

      /* ---------------------------------------------------------------------
         Hero — landing top section
         --------------------------------------------------------------------- */
      .hero {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        color: #f1f5f9;
        border-radius: 10px;
        padding: 2rem 2rem 1.5rem;
        margin-bottom: 2rem;
      }

      .hero-title {
        font-size: 1.6rem;
        font-weight: 700;
        margin: 0 0 0.25rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .hero-title .badge {
        background: #fef3c7;
        color: #92400e;
        border-color: #fcd34d;
        font-size: 0.65rem;
      }

      .hero-subtitle {
        margin: 0.5rem 0 1rem;
        font-size: 0.95rem;
        color: #cbd5e1;
        line-height: 1.5;
      }

      .hero-subtitle a {
        color: #93c5fd;
      }

      .hero-install {
        margin: 0;
      }

      .docs-panel {
        background: #ffffff;
        border: 1px solid #dbeafe;
        border-radius: 10px;
        padding: 1.25rem;
        margin-bottom: 2rem;
      }

      .docs-panel h2 {
        font-size: 1rem;
        margin: 0 0 0.35rem;
        color: #1e40af;
      }

      .docs-panel p {
        max-width: 68ch;
        margin: 0 0 1rem;
        color: #475569;
        font-size: 0.9rem;
      }

      .docs-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .docs-links a {
        display: inline-flex;
        align-items: center;
        min-height: 2.25rem;
        padding: 0.45rem 0.75rem;
        border-radius: 6px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none;
      }

      .docs-links a:hover,
      .docs-links a:focus-visible {
        background: #dbeafe;
        outline: 2px solid #93c5fd;
        outline-offset: 2px;
      }

      /* ---------------------------------------------------------------------
         Demo example — centered calendar / component area
         --------------------------------------------------------------------- */
      .demo-example {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        width: 100%;
        margin: 1.5rem 0;
        padding: 1rem 0;
        overflow-x: auto;
      }

      /* ---------------------------------------------------------------------
         Demo callout — quote/callout below the example
         --------------------------------------------------------------------- */
      .demo-callout {
        margin: 0.75rem 0 0;
        padding: 0.875rem 1rem;
        background: #f8fafc;
        border: 1px solid #dbeafe;
        border-radius: 6px;
        font-size: 0.85rem;
        line-height: 1.6;
        color: #475569;
      }

      @media (min-width: 700px) {
        .container {
          --page-max-width: 44rem;
          padding-inline: 1.25rem;
        }

        .demo-panel {
          --demo-panel-max-width: 44rem;
        }
      }

      @media (min-width: 960px) {
        .container {
          --page-max-width: 64rem;
          padding-inline: 1.5rem;
        }

        .demo-panel {
          --demo-panel-max-width: 56rem;
        }
      }

      @media (min-width: 1200px) {
        .container {
          --page-max-width: 76rem;
        }

        .demo-panel {
          --demo-panel-max-width: 60rem;
        }
      }

      @media (min-width: 1440px) {
        .container {
          --page-max-width: 84rem;
        }
      }

      .demo-callout p {
        margin: 0;
        max-width: 72ch;
      }

      .demo-callout code {
        background: #f1f5f9;
        padding: 0.1em 0.35em;
        border-radius: 3px;
        font-size: 0.85em;
      }

      /* ---------------------------------------------------------------------
         Demo code — native show/hide snippets per example
         --------------------------------------------------------------------- */
      .demo-code {
        margin-top: 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        background: #f8fafc;
      }

      .demo-code-summary {
        cursor: pointer;
        padding: 0.75rem 1rem;
        color: #1e40af;
        font-size: 0.85rem;
        font-weight: 700;
      }

      .demo-code-summary:focus-visible {
        outline: 2px solid #93c5fd;
        outline-offset: 2px;
      }

      .demo-code-pre {
        margin: 0;
        padding: 1rem;
        border-top: 1px solid #e2e8f0;
        background: #0f172a;
        color: #e2e8f0;
        font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
        font-size: 0.8rem;
        line-height: 1.55;
        overflow-x: auto;
      }

      /* ---------------------------------------------------------------------
         Before / After panel — upstream vs fork
         --------------------------------------------------------------------- */
      .before-after {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .before-after-col {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        padding: 1.25rem;
      }

      .before-after-col h3 {
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0 0 0.75rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid #e2e8f0;
      }

      .before-after-col.upstream {
        background: #fffbeb;
        border: 1px solid #fcd34d;
      }

      .before-after-col.upstream h3 {
        color: #92400e;
        border-bottom-color: #fde68a;
      }

      .before-after-col.fork h3 {
        color: #1e40af;
      }

      .upstream-callout {
        font-size: 0.8rem;
        color: #78350f;
        margin: 0 0 0.75rem;
        line-height: 1.5;
      }

      .upstream-callout a {
        color: #b45309;
      }

      .import-diff {
        background: #1e293b;
        color: #e2e8f0;
        padding: 0.5rem 0.75rem;
        border-radius: 5px;
        font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
        font-size: 0.75rem;
        overflow-x: auto;
        white-space: pre;
        margin: 0 0 0.75rem;
        line-height: 1.6;
      }

      .import-diff .removed {
        color: #fca5a5;
      }

      .import-diff .added {
        color: #86efac;
      }

      @media (max-width: 600px) {
        .container {
          padding: 1rem 0.75rem;
        }

        h1 {
          font-size: 1.25rem;
        }

        .before-after {
          grid-template-columns: 1fr;
        }

        .hero {
          padding: 1.25rem 1rem 1rem;
        }

        .hero-title {
          font-size: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
